<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低空经济智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message-bubble { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .flow-step { 
            animation: slideIn 0.2s ease;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #60a5fa;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 工具卡片样式 */
        .tool-card {
            animation: slideIn 0.3s ease;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .tool-card-header {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .tool-card-header:hover {
            opacity: 0.9;
        }
        .tool-card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .tool-card.expanded .tool-card-content {
            max-height: 500px;
        }
        .tool-card.expanded .expand-icon {
            transform: rotate(90deg);
        }
        .expand-icon {
            transition: transform 0.2s;
            font-size: 10px;
        }
        
        /* 智能体颜色主题 */
        .agent-chat { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.1)); border-left: 3px solid #10b981; }
        .agent-data { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.1)); border-left: 3px solid #3b82f6; }
        .agent-policy { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(124, 58, 237, 0.1)); border-left: 3px solid #8b5cf6; }
        .agent-article { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.1)); border-left: 3px solid #f59e0b; }
        .agent-default { background: linear-gradient(135deg, rgba(107, 114, 128, 0.2), rgba(75, 85, 99, 0.1)); border-left: 3px solid #6b7280; }
        
        /* JSON 代码样式 */
        .json-block {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.5;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e5e7eb;
        }
        .json-key { color: #93c5fd; }
        .json-string { color: #86efac; }
        .json-number { color: #fca5a5; }
        .json-boolean { color: #fbbf24; }
        
        /* 耗时标签 */
        .duration-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
        }
        .duration-fast { background: rgba(16, 185, 129, 0.3); color: #34d399; }
        .duration-normal { background: rgba(245, 158, 11, 0.3); color: #fbbf24; }
        .duration-slow { background: rgba(239, 68, 68, 0.3); color: #f87171; }
        
        /* Markdown 渲染样式 */
        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: #f3f4f6;
        }
        .markdown-content h1 { font-size: 1.4em; }
        .markdown-content h2 { font-size: 1.25em; }
        .markdown-content h3 { font-size: 1.1em; }
        .markdown-content p { margin: 8px 0; }
        .markdown-content ul, .markdown-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .markdown-content li { margin: 4px 0; }
        .markdown-content strong { font-weight: 600; color: #fff; }
        .markdown-content em { font-style: italic; }
        .markdown-content code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #fca5a5;
        }
        .markdown-content pre {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: #e5e7eb;
        }
        .markdown-content blockquote {
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 12px 0;
            color: #9ca3af;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-content th {
            background: rgba(0,0,0,0.2);
            font-weight: 600;
        }
        .markdown-content a {
            color: #60a5fa;
            text-decoration: underline;
        }
        .markdown-content hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 16px 0;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl bg-white/5 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/10 overflow-hidden flex flex-col" style="height: 90vh;">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600/80 to-indigo-600/80 px-6 py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-semibold text-lg">低空经济智能体</h1>
                    <p class="text-blue-200 text-xs">基于 Spring AI Alibaba</p>
                </div>
                <div class="ml-auto flex items-center gap-2">
                    <span id="statusDot" class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <span id="statusText" class="text-green-300 text-xs">就绪</span>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="px-6 py-3 bg-white/5 border-b border-white/10">
            <div class="flex gap-2 overflow-x-auto scrollbar-hide">
                <button onclick="setInput('你好，能做什么？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    👋 你好
                </button>
                <button onclick="setInput('北京招聘薪资是多少？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    💰 招聘薪资
                </button>
                <button onclick="setInput('各省份企业数量排名')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    🏢 企业排名
                </button>
                <button onclick="setInput('深圳近3个月岗位趋势')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    📈 趋势分析
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide">
            <div class="message-bubble flex gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white/90 text-sm leading-relaxed">
                        你好！我是低空经济智能体 🤖<br><br>
                        我可以帮你查询：<br>
                        • 💰 招聘薪资数据<br>
                        • 🏢 企业数量统计<br>
                        • 📊 行业趋势分析<br>
                        • 📍 地区对比排名<br><br>
                        试试问我：<span class="text-blue-300">"北京本科招聘薪资"</span> 或 <span class="text-blue-300">"各省份企业数量排名"</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="p-4 bg-white/5 border-t border-white/10">
            <div class="flex gap-2">
                <input id="input" placeholder="输入你的问题..." 
                    class="flex-1 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/40 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                    onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" id="sendBtn"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-5 py-3 rounded-xl text-sm font-medium">
                    发送
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let currentMsgEl = null;
        let currentFlowEl = null;
        let currentContentEl = null;
        let fullContent = '';
        let activeToolCards = new Map(); // 跟踪正在执行的工具卡片

        // 配置 marked.js
        marked.setOptions({
            breaks: true,  // 支持换行符转换
            gfm: true,     // 支持 GitHub Flavored Markdown
            sanitize: false // 允许 HTML（注意：确保后端输出安全）
        });

        // 自定义 renderer 处理代码块
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            return `<pre><code class="language-${language || ''}">${escapeHtml(code)}</code></pre>`;
        };
        marked.setOptions({ renderer: renderer });

        function setInput(text) {
            inputEl.value = text;
            inputEl.focus();
        }

        function setStatus(status, text) {
            statusText.textContent = text;
            if (status === 'loading') {
                statusDot.className = 'w-2 h-2 bg-yellow-400 rounded-full animate-pulse';
            } else if (status === 'error') {
                statusDot.className = 'w-2 h-2 bg-red-400 rounded-full';
            } else {
                statusDot.className = 'w-2 h-2 bg-green-400 rounded-full';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化 JSON 并添加语法高亮
        function formatJson(jsonStr) {
            try {
                const obj = JSON.parse(jsonStr);
                const formatted = JSON.stringify(obj, null, 2);
                return highlightJson(formatted);
            } catch (e) {
                return escapeHtml(jsonStr);
            }
        }

        // JSON 语法高亮
        function highlightJson(json) {
            return json.replace(/(".*?"):/g, '<span class="json-key">$1</span>:')
                       .replace(/: "(.*?)"/g, ': <span class="json-string">"$1"</span>')
                       .replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
                       .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>');
        }

        // 获取智能体样式类
        function getAgentClass(agent) {
            if (agent.includes('chat')) return 'agent-chat';
            if (agent.includes('data')) return 'agent-data';
            if (agent.includes('policy')) return 'agent-policy';
            if (agent.includes('article')) return 'agent-article';
            return 'agent-default';
        }

        // 获取智能体显示名称
        function getAgentDisplayName(agent) {
            const names = {
                'chat_agent': '闲聊助手',
                'data_query_agent': '数据查询',
                'policy_agent': '政策查询',
                'article_agent': '文章检索',
                'supervisor': '调度中心'
            };
            return names[agent] || agent;
        }

        // 获取智能体图标
        function getAgentIcon(agent) {
            if (agent.includes('chat')) return '💬';
            if (agent.includes('data')) return '📊';
            if (agent.includes('policy')) return '📜';
            if (agent.includes('article')) return '📰';
            return '🤖';
        }

        // 格式化耗时显示
        function formatDuration(ms) {
            if (ms < 1000) return `${ms}ms`;
            return `${(ms / 1000).toFixed(2)}s`;
        }

        // 获取耗时样式
        function getDurationClass(ms) {
            if (ms < 500) return 'duration-fast';
            if (ms < 2000) return 'duration-normal';
            return 'duration-slow';
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3 justify-end';
            div.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white text-sm">${escapeHtml(text)}</p>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function createBotContainer() {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] flex-1">
                    <div class="flow-container space-y-1 mb-3"></div>
                    <div class="content-area markdown-content text-white/90 text-sm leading-relaxed">
                        <p class=""></p>
                        <span class="cursor"></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            currentMsgEl = div;
            currentFlowEl = div.querySelector('.flow-container');
            currentContentEl = div.querySelector('.content-area');
            fullContent = '';
            activeToolCards.clear();
        }

        function addFlowStep(icon, text, colorClass) {
            if (!currentFlowEl) return;
            const div = document.createElement('div');
            div.className = 'flow-step text-xs flex items-center gap-2';
            div.innerHTML = `<span class="${colorClass}">${icon} ${escapeHtml(text)}</span>`;
            currentFlowEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // 添加工具调用卡片
        function addToolCard(toolData) {
            if (!currentFlowEl) return;
            
            const cardId = `tool-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            const agentClass = getAgentClass(toolData.agent);
            const agentName = getAgentDisplayName(toolData.agent);
            const agentIcon = getAgentIcon(toolData.agent);
            
            const div = document.createElement('div');
            div.className = `tool-card ${agentClass}`;
            div.id = cardId;
            div.innerHTML = `
                <div class="tool-card-header" onclick="toggleToolCard('${cardId}')">
                    <span class="expand-icon">▶</span>
                    <span class="text-xs font-medium text-white/90">${agentIcon} ${agentName}</span>
                    <span class="text-xs text-white/60">⚡ ${toolData.tool}</span>
                    <span class="loading-dots text-xs text-white/60 ml-auto">执行中...</span>
                </div>
                <div class="tool-card-content">
                    <div class="px-3 pb-3">
                        <div class="text-xs text-white/50 mb-1">参数:</div>
                        <div class="json-block">${formatJson(toolData.params)}</div>
                        <div class="result-area hidden mt-2">
                            <div class="text-xs text-white/50 mb-1">结果:</div>
                            <div class="json-block result-content"></div>
                        </div>
                    </div>
                </div>
            `;
            
            currentFlowEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            
            activeToolCards.set(toolData.agent + '-' + toolData.tool, {
                id: cardId,
                data: toolData
            });
            
            return cardId;
        }

        // 更新工具卡片（执行完成）
        function updateToolCard(toolData) {
            const key = toolData.agent + '-' + toolData.tool;
            const cardInfo = activeToolCards.get(key);
            
            if (cardInfo) {
                const card = document.getElementById(cardInfo.id);
                if (card) {
                    // 更新头部信息
                    const header = card.querySelector('.tool-card-header');
                    const loadingEl = header.querySelector('.loading-dots');
                    const durationClass = getDurationClass(toolData.duration);
                    const durationText = formatDuration(toolData.duration);
                    
                    loadingEl.outerHTML = `<span class="duration-badge ${durationClass}">${durationText}</span>`;
                    
                    // 显示结果
                    const resultArea = card.querySelector('.result-area');
                    const resultContent = card.querySelector('.result-content');
                    resultArea.classList.remove('hidden');
                    resultContent.innerHTML = formatJson(toolData.result);
                    
                    // 自动展开卡片
                    card.classList.add('expanded');
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
                activeToolCards.delete(key);
            }
        }

        // 切换工具卡片展开/折叠
        window.toggleToolCard = function(cardId) {
            const card = document.getElementById(cardId);
            if (card) {
                card.classList.toggle('expanded');
            }
        };

        function appendContent(text) {
            if (!currentContentEl) return;
            fullContent += text;
            // 使用 marked.js 渲染 Markdown
            const htmlContent = marked.parse(fullContent);
            currentContentEl.innerHTML = htmlContent;
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function finishStream() {
            if (currentMsgEl) {
                const cursor = currentMsgEl.querySelector('.content-area .cursor');
                if (cursor) cursor.remove();
            }
            currentMsgEl = null;
            currentFlowEl = null;
            currentContentEl = null;
            fullContent = '';
            activeToolCards.clear();
            sendBtn.disabled = false;
            setStatus('ready', '就绪');
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addUserMessage(message);
            inputEl.value = '';
            sendBtn.disabled = true;
            setStatus('loading', '处理中...');

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasCreated = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        
                        // 解析 Spring SSE 格式: data: {json}
                        let jsonStr = line;
                        if (line.startsWith('data:')) {
                            jsonStr = line.slice(5).trim();
                        }
                        
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const eventType = parsed.event;
                            const eventData = parsed.data;
                            
                            if (!hasCreated && eventType !== 'done') {
                                createBotContainer();
                                hasCreated = true;
                            }

                            switch(eventType) {
                                case 'thinking':
                                    addFlowStep('🤔', eventData, 'text-yellow-300');
                                    break;
                                case 'thinking_detail':
                                    addFlowStep('💭', eventData, 'text-gray-400');
                                    break;
                                case 'agent':
                                    const [agentName, purpose] = eventData.split('|');
                                    addFlowStep('🤖', `调用 ${agentName}: ${purpose || '处理中'}`, 'text-purple-300');
                                    break;
                                case 'step':
                                    addFlowStep('⚡', eventData, 'text-blue-300');
                                    break;
                                case 'tool_start':
                                    // 新的详细工具调用事件
                                    try {
                                        const toolData = JSON.parse(eventData);
                                        addToolCard(toolData);
                                    } catch (e) {
                                        // 解析失败，忽略
                                    }
                                    break;
                                case 'tool_end':
                                    // 新的详细工具完成事件
                                    try {
                                        const toolData = JSON.parse(eventData);
                                        updateToolCard(toolData);
                                    } catch (e) {
                                        // 解析失败，忽略
                                    }
                                    break;
                                case 'tool_call':
                                    // 旧版兼容
                                    const [toolName, args] = eventData.split('|');
                                    addFlowStep('🔧', `调用 ${toolName}`, 'text-orange-300');
                                    break;
                                case 'tool_result':
                                    // 旧版兼容
                                    const [tName, result] = eventData.split('|');
                                    addFlowStep('✅', `${tName} 完成`, 'text-green-300');
                                    break;
                                case 'tool':
                                    addFlowStep('🔧', eventData, 'text-orange-300');
                                    break;
                                case 'content':
                                    appendContent(eventData);
                                    break;
                                case 'error':
                                    addFlowStep('❌', eventData, 'text-red-300');
                                    break;
                                case 'done':
                                    finishStream();
                                    return;
                            }
                        } catch (e) {
                            // 不是 JSON 格式，可能是普通 SSE 行，忽略
                        }
                    }
                }
                finishStream();
            } catch (err) {
                console.error('Error:', err);
                if (!currentMsgEl) createBotContainer();
                addFlowStep('❌', '网络错误: ' + err.message, 'text-red-300');
                finishStream();
            }
        }

        inputEl.focus();
    </script>
</body>
</html>
