<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低空经济智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message-bubble { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-dot {
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 流程步骤动画 */
        .flow-step {
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* 代码块样式 */
        .code-block {
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 12px;
            color: #a5b4fc;
            margin-top: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl bg-white/5 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/10 overflow-hidden flex flex-col" style="height: 90vh;">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600/80 to-indigo-600/80 px-6 py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-semibold text-lg">低空经济智能体</h1>
                    <p class="text-blue-200 text-xs">基于 Spring AI Alibaba</p>
                </div>
                <div class="ml-auto flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-green-300 text-xs">在线</span>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="px-6 py-3 bg-white/5 border-b border-white/10">
            <div class="flex gap-2 overflow-x-auto scrollbar-hide">
                <button onclick="setInput('你好，能做什么？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    👋 你好
                </button>
                <button onclick="setInput('北京招聘薪资是多少？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    💰 招聘薪资
                </button>
                <button onclick="setInput('各省份企业数量排名')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    🏢 企业排名
                </button>
                <button onclick="setInput('深圳近3个月岗位趋势')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    📈 趋势分析
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide">
            <!-- Welcome Message -->
            <div class="message-bubble flex gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white/90 text-sm leading-relaxed">
                        你好！我是低空经济智能体 🤖<br><br>
                        我可以帮你查询：<br>
                        • 💰 招聘薪资数据<br>
                        • 🏢 企业数量统计<br>
                        • 📊 行业趋势分析<br>
                        • 📍 地区对比排名<br><br>
                        试试问我：<span class="text-blue-300">"北京本科招聘薪资"</span> 或 <span class="text-blue-300">"各省份企业数量排名"</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="p-4 bg-white/5 border-t border-white/10">
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="input" 
                    placeholder="输入你的问题..." 
                    class="flex-1 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/40 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition"
                    onkeypress="if(event.key==='Enter') sendMessage()"
                >
                <button 
                    onclick="sendMessage()" 
                    id="sendBtn"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-5 py-3 rounded-xl transition flex items-center gap-2"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    <span class="text-sm font-medium">发送</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        function setInput(text) {
            inputEl.value = text;
            inputEl.focus();
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3 justify-end';
            div.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white text-sm">${escapeHtml(text)}</p>
                </div>
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        // 当前消息容器
        let currentMessageEl = null;
        let currentContentEl = null;
        let currentFlowEl = null;

        function createMessageContainer() {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] flex-1">
                    <!-- 思考流程区域 -->
                    <div class="flow-container space-y-2 mb-3"></div>
                    <!-- 内容区域 -->
                    <div class="content-area">
                        <p class="text-white/90 text-sm leading-relaxed"></p>
                        <span class="inline-block w-2 h-4 bg-blue-400 animate-pulse ml-0.5 align-middle"></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            currentMessageEl = div;
            currentFlowEl = div.querySelector('.flow-container');
            currentContentEl = div.querySelector('.content-area p');
            return div;
        }

        function addFlowStep(type, content, data) {
            if (!currentFlowEl) return;
            
            const stepDiv = document.createElement('div');
            stepDiv.className = 'flow-step flex items-start gap-2 text-xs';
            
            let icon = '';
            let colorClass = '';
            
            switch(type) {
                case 'thinking':
                    icon = '🤔';
                    colorClass = 'text-yellow-300';
                    break;
                case 'agent_call':
                    icon = '🤖';
                    colorClass = 'text-purple-300';
                    break;
                case 'tool_call':
                    icon = '🔧';
                    colorClass = 'text-orange-300';
                    break;
                case 'tool_result':
                    icon = '✅';
                    colorClass = 'text-green-300';
                    break;
                case 'error':
                    icon = '❌';
                    colorClass = 'text-red-300';
                    break;
                default:
                    icon = '•';
                    colorClass = 'text-gray-300';
            }
            
            stepDiv.innerHTML = `
                <span class="flex-shrink-0">${icon}</span>
                <span class="${colorClass}">${escapeHtml(content)}</span>
            `;
            
            // 如果是工具调用，添加参数详情
            if (type === 'tool_call' && data) {
                try {
                    const dataObj = JSON.parse(data);
                    if (dataObj.params) {
                        const paramsDiv = document.createElement('div');
                        paramsDiv.className = 'code-block';
                        paramsDiv.textContent = dataObj.params.substring(0, 200) + (dataObj.params.length > 200 ? '...' : '');
                        stepDiv.appendChild(paramsDiv);
                    }
                } catch(e) {}
            }
            
            currentFlowEl.appendChild(stepDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendContent(text) {
            if (!currentContentEl) return;
            
            const currentText = currentContentEl.getAttribute('data-raw') || '';
            const newText = currentText + text;
            currentContentEl.setAttribute('data-raw', newText);
            currentContentEl.innerHTML = formatMessage(newText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function finishStream() {
            if (currentMessageEl) {
                const cursor = currentMessageEl.querySelector('.content-area span.animate-pulse');
                if (cursor) cursor.remove();
            }
            currentMessageEl = null;
            currentContentEl = null;
            currentFlowEl = null;
            sendBtn.disabled = false;
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addUserMessage(message);
            inputEl.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error('请求失败: ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasCreatedMessage = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            
                            // 解析 Base64 编码的事件: event|content|data
                            const parts = dataStr.split('|');
                            const eventType = parts[0] ? atob(parts[0]) : '';
                            const content = parts[1] ? atob(parts[1]) : '';
                            const extraData = parts[2] ? atob(parts[2]) : null;
                            
                            if (!hasCreatedMessage && eventType !== 'done') {
                                createMessageContainer();
                                hasCreatedMessage = true;
                            }
                            
                            switch(eventType) {
                                case 'thinking':
                                case 'agent_call':
                                case 'tool_call':
                                case 'tool_result':
                                case 'error':
                                    addFlowStep(eventType, content, extraData);
                                    break;
                                case 'content':
                                    appendContent(content);
                                    break;
                                case 'done':
                                    finishStream();
                                    return;
                            }
                        }
                    }
                }
                
                // 处理剩余缓冲区
                if (buffer.startsWith('data: ')) {
                    const dataStr = buffer.slice(6).trim();
                    const parts = dataStr.split('|');
                    const eventType = parts[0] ? atob(parts[0]) : '';
                    if (eventType === 'done') {
                        finishStream();
                    }
                }
                
                finishStream();

            } catch (error) {
                addBotMessageWithFlow('网络错误，请稍后重试：' + error.message);
                sendBtn.disabled = false;
            }
        }

        function addBotMessageWithFlow(text) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white/90 text-sm leading-relaxed">${formatMessage(text)}</p>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Auto-focus input on load
        inputEl.focus();
    </script>
</body>
</html>
