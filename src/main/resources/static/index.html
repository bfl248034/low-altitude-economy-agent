<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低空经济智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .message-bubble { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .flow-step { 
            animation: slideIn 0.2s ease;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #60a5fa;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl bg-white/5 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/10 overflow-hidden flex flex-col" style="height: 90vh;">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600/80 to-indigo-600/80 px-6 py-4 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-semibold text-lg">低空经济智能体</h1>
                    <p class="text-blue-200 text-xs">基于 Spring AI Alibaba</p>
                </div>
                <div class="ml-auto flex items-center gap-2">
                    <span id="statusDot" class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <span id="statusText" class="text-green-300 text-xs">就绪</span>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="px-6 py-3 bg-white/5 border-b border-white/10">
            <div class="flex gap-2 overflow-x-auto scrollbar-hide">
                <button onclick="setInput('你好，能做什么？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    👋 你好
                </button>
                <button onclick="setInput('北京招聘薪资是多少？')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    💰 招聘薪资
                </button>
                <button onclick="setInput('各省份企业数量排名')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    🏢 企业排名
                </button>
                <button onclick="setInput('深圳近3个月岗位趋势')" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white/80 text-xs rounded-full transition whitespace-nowrap">
                    📈 趋势分析
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide">
            <div class="message-bubble flex gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white/90 text-sm leading-relaxed">
                        你好！我是低空经济智能体 🤖<br><br>
                        我可以帮你查询：<br>
                        • 💰 招聘薪资数据<br>
                        • 🏢 企业数量统计<br>
                        • 📊 行业趋势分析<br>
                        • 📍 地区对比排名<br><br>
                        试试问我：<span class="text-blue-300">"北京本科招聘薪资"</span> 或 <span class="text-blue-300">"各省份企业数量排名"</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="p-4 bg-white/5 border-t border-white/10">
            <div class="flex gap-2">
                <input id="input" placeholder="输入你的问题..." 
                    class="flex-1 bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/40 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                    onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" id="sendBtn"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-5 py-3 rounded-xl text-sm font-medium">
                    发送
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let currentMsgEl = null;
        let currentFlowEl = null;
        let currentContentEl = null;
        let fullContent = '';

        function setInput(text) {
            inputEl.value = text;
            inputEl.focus();
        }

        function setStatus(status, text) {
            statusText.textContent = text;
            if (status === 'loading') {
                statusDot.className = 'w-2 h-2 bg-yellow-400 rounded-full animate-pulse';
            } else if (status === 'error') {
                statusDot.className = 'w-2 h-2 bg-red-400 rounded-full';
            } else {
                statusDot.className = 'w-2 h-2 bg-green-400 rounded-full';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3 justify-end';
            div.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
                    <p class="text-white text-sm">${escapeHtml(text)}</p>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function createBotContainer() {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-white/10 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] flex-1">
                    <div class="flow-container space-y-1 mb-3"></div>
                    <div class="content-area">
                        <p class="text-white/90 text-sm leading-relaxed"></p>
                        <span class="cursor"></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            currentMsgEl = div;
            currentFlowEl = div.querySelector('.flow-container');
            currentContentEl = div.querySelector('.content-area p');
            fullContent = '';
        }

        function addFlowStep(icon, text, colorClass) {
            if (!currentFlowEl) return;
            const div = document.createElement('div');
            div.className = 'flow-step text-xs flex items-center gap-2';
            div.innerHTML = `<span class="${colorClass}">${icon} ${escapeHtml(text)}</span>`;
            currentFlowEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendContent(text) {
            if (!currentContentEl) return;
            fullContent += text;
            currentContentEl.innerHTML = escapeHtml(fullContent).replace(/\n/g, '<br>');
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function finishStream() {
            if (currentMsgEl) {
                const cursor = currentMsgEl.querySelector('.content-area .cursor');
                if (cursor) cursor.remove();
            }
            currentMsgEl = null;
            currentFlowEl = null;
            currentContentEl = null;
            fullContent = '';
            sendBtn.disabled = false;
            setStatus('ready', '就绪');
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addUserMessage(message);
            inputEl.value = '';
            sendBtn.disabled = true;
            setStatus('loading', '处理中...');

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasCreated = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    let currentEvent = '';
                    let currentData = '';

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            currentEvent = line.slice(6).trim();
                        } else if (line.startsWith('data:')) {
                            currentData = line.slice(5).trim();
                        } else if (line === '' && currentEvent) {
                            if (!hasCreated && currentEvent !== 'done') {
                                createBotContainer();
                                hasCreated = true;
                            }

                            switch(currentEvent) {
                                case 'thinking':
                                    addFlowStep('🤔', currentData, 'text-yellow-300');
                                    break;
                                case 'thinking_detail':
                                    addFlowStep('💭', currentData, 'text-gray-400');
                                    break;
                                case 'agent':
                                    const [agentName, purpose] = currentData.split('|');
                                    addFlowStep('🤖', `调用 ${agentName}: ${purpose || '处理中'}`, 'text-purple-300');
                                    break;
                                case 'step':
                                    addFlowStep('⚡', currentData, 'text-blue-300');
                                    break;
                                case 'tool_call':
                                    const [toolName, args] = currentData.split('|');
                                    addFlowStep('🔧', `调用 ${toolName}`, 'text-orange-300');
                                    break;
                                case 'tool_result':
                                    const [tName, result] = currentData.split('|');
                                    addFlowStep('✅', `${tName} 完成`, 'text-green-300');
                                    break;
                                case 'tool':
                                    addFlowStep('🔧', currentData, 'text-orange-300');
                                    break;
                                case 'content':
                                    appendContent(currentData);
                                    break;
                                case 'error':
                                    addFlowStep('❌', currentData, 'text-red-300');
                                    break;
                                case 'done':
                                    finishStream();
                                    return;
                            }
                            currentEvent = '';
                            currentData = '';
                        }
                    }
                }
                finishStream();
            } catch (err) {
                console.error('Error:', err);
                if (!currentMsgEl) createBotContainer();
                addFlowStep('❌', '网络错误: ' + err.message, 'text-red-300');
                finishStream();
            }
        }

        inputEl.focus();
    </script>
</body>
</html>
